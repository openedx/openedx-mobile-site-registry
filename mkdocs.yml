site_name: Open X Project — Documentation
site_description: How the Open X Project app, the LMS registry, and the admin console work — for learners, LMS owners, and administrators.
site_url: https://openedx-lms.stepanok.com/guide/
docs_dir: docs
# Built into the app's static dir so the same container serves the docs at /guide/.
site_dir: app/static/guide

theme:
  name: material
  language: en
  font: false            # use the system font stack (matches the console)
  palette:
    - scheme: default
      primary: custom
      accent: custom
  icon:
    logo: material/layers-triple-outline
  features:
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - navigation.footer
    - search.suggest
    - search.highlight
    - content.code.copy
    - toc.follow

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

nav:
  - Home: index.md
  - How it works: how-it-works.md
  - For learners (mobile app): learners.md
  - Register your LMS (owners): registering-an-lms.md
  - Admin console: admin-console.md
  - Provider / curated mode: provider-mode.md
  - Configuration & deployment: deploying.md
  - API reference: api.md
